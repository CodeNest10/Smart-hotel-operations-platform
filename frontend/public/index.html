<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ── Favicon: SVG (all modern browsers) ── -->
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <!-- PNG fallback for Safari / older browsers -->
    <link rel="alternate icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- ── Viewport & theme ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0B1F3A" />

    <!-- ── Primary meta ── -->
    <meta name="description" content="SmartHotel — Real-time hotel operations platform. Live occupancy, housekeeping, and guest request management powered by event-driven microservices." />
    <meta name="author" content="SmartHotel Operations Team" />
    <meta name="keywords" content="hotel management, operations, real-time, kafka, react, microservices" />

    <!-- ── Open Graph (social sharing) ── -->
    <meta property="og:title"       content="SmartHotel — Operations Platform" />

    <meta property="og:type"        content="website" />

    <!-- ── Apple touch icon ── -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- ── Web app manifest ── -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ── Google Fonts: Inter (FAANG-grade typography) ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- ── Page title ── -->
    <title>SmartHotel · Operations Platform</title>

    <!-- ── Inline critical CSS: prevent flash of unstyled background ── -->
    <style>
      html, body { margin: 0; padding: 0; background: #F2F4F7; }
      #root { min-height: 100vh; }
    </style>
